<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Troco Inteligente PRO</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle at center, #1a1a2e, #0f0f1a, #000);
    color: #fff;
    overflow: hidden;
}

/* ===== TELA DE CARREGAMENTO PREMIUM ===== */
#splash {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100vh;
    background: radial-gradient(circle at center, #1a1a2e, #0f0f1a);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
    transition: opacity 0.8s ease;
}
.splash-content {
    text-align: center;
    animation: pulse 1.5s infinite alternate;
}
.splash-content h1 {
    font-size: 32px;
    background: linear-gradient(45deg, #FFD700, #ffffff, #FFD700);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    font-weight: 900;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 25px;
    text-shadow: 0 0 30px rgba(255, 215, 0, 0.7);
}
.loader {
    width: 65px;
    height: 65px;
    border: 5px solid rgba(255,255,255,0.1);
    border-top-color: #FFD700;
    border-radius: 50%;
    margin: 0 auto;
    animation: spin 1s linear infinite;
    box-shadow: 0 0 25px #FFD700;
}
@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}
@keyframes pulse {
    from { transform: scale(1); }
    to { transform: scale(1.08); }
}
/* ===== FIM DO LOAD ===== */

/* CARD ESTILO NOBRE */
.card {
    width: 95%;
    max-width: 400px;
    padding: 35px;
    border-radius: 30px;
    background: rgba(20, 20, 40, 0.6);
    border: 1px solid rgba(255, 215, 0, 0.4);
    backdrop-filter: blur(30px);
    box-shadow: 0 25px 60px rgba(0,0,0,0.9), 0 0 40px rgba(255, 215, 0, 0.15);
    animation: aparecer 1s ease;
}

@keyframes aparecer {
    from {opacity:0; transform: translateY(60px) scale(0.9);}
    to {opacity:1; transform: translateY(0) scale(1);}
}

h1 {
    text-align: center;
    margin-bottom: 25px;
    font-size: 30px;
    background: linear-gradient(45deg, #FFD700, #FFF8DC);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: 2px;
    font-weight: 900;
}

/* INPUTS ESTILO OURO */
input {
    width: 100%;
    padding: 18px;
    margin: 10px 0;
    border-radius: 18px;
    border: 1px solid rgba(255, 215, 0, 0.3);
    background: rgba(0,0,0,0.5);
    color: #fff;
    font-size: 17px;
    outline: none;
    transition: 0.4s;
}
input:focus {
    border-color: #FFD700;
    box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
}

/* BOTÃO PREMIUM */
button {
    width: 100%;
    padding: 18px;
    margin-top: 15px;
    border: none;
    border-radius: 18px;
    background: linear-gradient(45deg, #FFD700, #FFC107, #FFD700);
    color: #000;
    font-weight: bold;
    font-size: 18px;
    text-transform: uppercase;
    letter-spacing: 1px;
    cursor: pointer;
    transition: 0.3s;
    box-shadow: 0 10px 30px rgba(255, 215, 0, 0.4);
}

button:hover {
    transform: scale(1.06);
    box-shadow: 0 15px 40px rgba(255, 215, 0, 0.7);
}

/* RESULTADO */
.result {
    margin-top: 20px;
    padding: 18px;
    border-radius: 18px;
    background: rgba(0,0,0,0.5);
    border: 1px solid rgba(255,255,255,0.1);
    animation: aparecer 0.5s ease;
    font-size: 20px;
    text-align: center;
    color: #FFD700;
    font-weight: bold;
}

.sugestao {
    margin-top: 15px;
    font-size: 15px;
    color: #FFE082;
    line-height: 1.6;
}

.erro {
    color: #ff6b6b;
    font-weight: bold;
}
</style>
</head>

<body>

<!-- TELA DE LOAD -->
<div id="splash">
    <div class="splash-content">
        <h1>Troco Inteligente PRO</h1>
        <div class="loader"></div>
    </div>
</div>

<div class="card">
    <h1>💸 Troco PRO</h1>

    <input type="number" id="valor" placeholder="Valor da compra (R$)">
    <input type="number" id="pago" placeholder="Valor pago (R$)">

    <button onclick="calcular()">Calcular</button>

    <div class="result" id="resultado"></div>
    <div class="sugestao" id="sugestao"></div>
</div>

<script>
// SCRIPT PARA SUMIR O LOAD
setTimeout(() => {
    document.getElementById('splash').style.opacity = '0';
    setTimeout(() => {
        document.getElementById('splash').style.display = 'none';
    }, 600);
}, 3000);

function calcular() {
    let valor = parseFloat(document.getElementById("valor").value);
    let pago = parseFloat(document.getElementById("pago").value);

    let res = document.getElementById("resultado");
    let sug = document.getElementById("sugestao");

    if (isNaN(valor) || isNaN(pago)) {
        res.innerHTML = "<span class='erro'>Preencha os valores!</span>";
        sug.innerHTML = "";
        return;
    }

    if (pago < valor) {
        res.innerHTML = "<span class='erro'>Valor insuficiente!</span>";
        sug.innerHTML = "";
        return;
    }

    let troco = pago - valor;
    res.innerHTML = "💰 Troco: R$ " + troco.toFixed(2);

    gerarSugestao(troco);
}

function gerarSugestao(troco) {
    let notas = [200, 100, 50, 20, 10, 5, 2, 1];
    let moedas = [0.50, 0.25, 0.10, 0.05];

    let texto = "";

    notas.forEach(n => {
        let qtd = Math.floor(troco / n);
        if (qtd > 0) {
            texto += `${qtd}x nota de R$${n}<br>`;
            troco %= n;
        }
    });

    moedas.forEach(m => {
        let qtd = Math.floor((troco + 0.001) / m);
        if (qtd > 0) {
            texto += `${qtd}x moeda de R$${m.toFixed(2)}<br>`;
            troco %= m;
        }
    });

    document.getElementById("sugestao").innerHTML =
        "💡 Melhor forma de dar o troco:<br>" + texto;
}
</script>

</body>
</html>
